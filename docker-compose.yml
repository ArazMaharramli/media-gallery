services:
  postgres:
    image: postgres:16-alpine
    container_name: media-gallery-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_gallery
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: media-gallery-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_gallery
      NUXT_UPLOAD_DIR: /app/uploads
      NUXT_PUBLIC_UPLOAD_CHUNK_SIZE: 2097152
      NUXT_UPLOAD_STALE_THRESHOLD_HOURS: 24
      NUXT_PUBLIC_UPLOAD_MAX_CHUNKED_SIZE: 10737418240
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
